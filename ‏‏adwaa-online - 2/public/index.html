<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>أضواء أونلاين - الدعم الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{margin:0;background:#05070a;color:white;height:100vh;display:flex;flex-direction:column;}
header{background:#0a0d14;border-bottom:1px solid rgba(255,98,0,.2);padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;gap:10px;align-items:center}
.logoBox{background:linear-gradient(135deg,#ff6200,#e65900);padding:10px;border-radius:10px;font-weight:bold;}
.status{font-size:11px;opacity:.7}
.tabs button{background:#111827;border:none;color:#aaa;padding:8px 12px;border-radius:8px;margin-left:5px;cursor:pointer;}
.tabs button.active{background:#ff6200;color:white;}
.chatArea{flex:1;overflow:auto;padding:20px;}
.message{display:flex;margin-bottom:14px;}
.message.user{justify-content:flex-end}
.bubble{max-width:75%;padding:12px;border-radius:14px;font-size:14px;white-space:pre-wrap;}
.bot .bubble{background:#111827;border-right:4px solid #ff6200;}
.user .bubble{background:#ff6200;}
.time{font-size:9px;opacity:.4;margin-top:5px;}
.inputArea{padding:15px;background:#0a0d14;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:10px;}
#input{flex:1;background:#111827;border:2px solid #333;padding:12px;border-radius:12px;color:white;resize:none;}
.sendBtn{background:#ff6200;border:none;padding:12px 18px;border-radius:10px;color:white;cursor:pointer;}
.sendBtn:hover{background:#ff7b26}
.tools{display:none;padding:25px;}
.tool{background:#111827;border:1px solid #333;padding:15px;border-radius:16px;margin-bottom:12px;cursor:pointer;transition:.2s;}
.tool:hover{border-color:#ff6200;transform:scale(1.02);}
.loader{font-size:12px;opacity:.7;animation:pulse 1s infinite;}
@keyframes pulse{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
footer{text-align:center;font-size:10px;padding:10px;opacity:.4;}
</style>
</head>

<body>
<header>
<div class="logo">
<div class="logoBox">⚡</div>
<div>
<div style="font-weight:900">أضواء أونلاين</div>
<div class="status">متصل</div>
</div>
</div>
<div class="tabs">
<button id="chatBtn" class="active">💬</button>
<button id="toolsBtn">✨</button>
</div>
</header>

<div id="chat" class="chatArea"></div>

<div id="tools" class="tools">
<div class="tool" onclick="quickAsk('أعطني أقوى العروض الحالية')">🔥 أقوى العروض</div>
<div class="tool" onclick="quickAsk('أريد بيانات الإيداع')">💰 بيانات الإيداع</div>
<div class="tool" onclick="quickAsk('ليش أضواء أونلاين هو الأفضل؟')">💡 لماذا نحن؟</div>
</div>

<div class="inputArea">
<textarea id="input" rows="1" placeholder="اسأل نور عن أي خدمة..."></textarea>
<button class="sendBtn" onclick="send()">ارسال</button>
</div>

<footer>تطوير شركة تكتيك سوفت | 2025</footer>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

function addMessage(text,type){
    let div=document.createElement("div");
    div.className="message "+type;
    div.innerHTML=`<div class="bubble">${text}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

// الترحيب مرة واحدة فقط
addMessage("مرحبًا بك في 'adhwaonline'! 🌟 شكرًا لتواصلك معنا. كيف يمكننا مساعدتك اليوم؟ 😊","bot");

async function send(){
    let text=input.value.trim();
    if(!text) return;
    addMessage(text,"user");
    input.value="";

    let loader=document.createElement("div");
    loader.className="message bot";
    loader.innerHTML='<div class="bubble loader">نور يكتب لك...</div>';
    chat.appendChild(loader);

    try{
        let response=await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({text})
        });
        let data=await response.json();
        loader.remove();
        addMessage(data.reply || "💡 حصل ضغط على السيرفر حاول مرة ثانية","bot");
    }catch(err){
        loader.remove();
        addMessage("💡 حصل ضغط على السيرفر حاول مرة ثانية","bot");
        console.log(err);
    }
}

function quickAsk(q){input.value=q;send();}

input.addEventListener("keydown",function(e){
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});

document.getElementById("chatBtn").onclick=()=>{ chat.style.display="block"; tools.style.display="none"; }
document.getElementById("toolsBtn").onclick=()=>{ chat.style.display="none"; tools.style.display="block"; }
</script>
</body>
</html>
